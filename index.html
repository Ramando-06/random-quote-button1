<!-- Sumber: W3Schools - HTML Doctype Declaration
Pembahasan: Ini adalah sebuah instruksi atau deklarasi kepada browser. Tujuannya agar browser merender halaman web menggunakan standar HTML5 (mode standar), bukan Quirks Mode (mode lama yang bisa membuat tampilan CSS berantakan). -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Quote</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 <!-- Sumber: MDN Web Docs - The Main Top-Level Element
Pembahasan: Tag ini memberi tahu mesin pencari (SEO seperti Google) dan alat bantu baca bahwa di sinilah tempat konten utama yang unik dari aplikasi webmu berada. Elemen seperti navigasi atau footer (jika ada nanti) harus berada di luar tag ini -->
  <main class="container">
    <!-- Sumber: MDN Web Docs - The Block Quotation element
Pembahasan: Secara semantik, elemen ini digunakan untuk menunjukkan bahwa teks di dalamnya adalah sebuah kutipan (quotation). Browser secara otomatis mengenali arti dari konten ini. -->
    <blockquote id="quote" class="quote" aria-live="polite">
      Click the button for a random quote.
    </blockquote>
    <p id="author" class="author"></p>
    <button id="quote-btn" type="button">New Quote</button>
    
    <!-- #GONG Menjelaskan bagaimana tombol New Quote menangkap klik dari pengguna. -->
    
  </main>
  <script src="quotes.js"></script>
  <script src="script.js"></script>
</body>
</html>
